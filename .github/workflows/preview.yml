name: Preview recent posts

on:
  push:
    paths:
      - "trigger-preview/**"

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg fonts-noto-cjk fonts-noto-cjk-extra
          pip install pillow
      - name: Run in PREVIEW mode
        id: run
        continue-on-error: true
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          PREVIEW: "true"
          MAX_POSTS_PER_RUN: "5"
          LOOKBACK_TWEETS: "25"
        run: |
          set -o pipefail
          rm -f preview/captions.md
          python3 sync.py 2>&1 | tee /tmp/preview.log
      - name: Commit preview outputs
        run: |
          mkdir -p logs preview
          cp /tmp/preview.log logs/preview-latest.log
          echo "exit_status=${{ steps.run.outcome }}" >> logs/preview-latest.log
          git config user.name "sync-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A logs preview
          git commit -m "preview outputs [skip ci]" || echo "no changes"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push
