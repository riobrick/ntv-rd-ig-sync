name: X to Instagram sync

on:
  # schedule:            # DISABLED until video format is finalized
  #   - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no posting)"
        type: boolean
        default: false

concurrency:
  group: sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install ffmpeg and fonts
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg fonts-noto-cjk fonts-noto-cjk-extra
          pip install pillow
      - name: Run sync
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python3 sync.py
      - name: Commit posted-state
        run: |
          git config user.name "sync-bot"
          git config user.email "bot@users.noreply.github.com"
          git add posted_ids.json 2>/dev/null || true
          git commit -m "update posted state [skip ci]" || echo "no changes"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push || true
