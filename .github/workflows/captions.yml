name: Captions-only preview

on:
  push:
    paths:
      - "trigger-captions/**"

permissions:
  contents: write

jobs:
  captions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          pip install pillow
          npm install -g @anthropic-ai/claude-code
      - name: Generate captions only
        id: run
        continue-on-error: true
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          CAPTIONS_ONLY: "true"
          MAX_POSTS_PER_RUN: "50"
          LOOKBACK_TWEETS: "100"
          START_TIME: "2026-06-30T15:00:00Z"   # 2026-07-01 00:00 JST
        run: |
          set -o pipefail
          rm -f preview/captions.md
          python3 sync.py 2>&1 | tee /tmp/captions.log
      - name: Commit outputs
        run: |
          mkdir -p logs preview
          cp /tmp/captions.log logs/captions-latest.log
          echo "exit_status=${{ steps.run.outcome }}" >> logs/captions-latest.log
          git config user.name "sync-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A logs preview
          git commit -m "captions preview [skip ci]" || echo "no changes"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push
